{% extends "base.html" %}
{% block title %}Activity Logs{% endblock %}

{% block content %}
<h2>Activity Logs</h2>

<table class="data-table">
    <thead><tr><th>Time</th><th>User ID</th><th>Action</th><th>Details</th></tr></thead>
    <tbody>
    {% for log in logs %}
        <tr>
            <td>{{ log.created_at.strftime('%Y-%m-%d %H:%M:%S') }}</td>
            <td>{{ log.user_id or '—' }}</td>
            <td>{{ log.action }}</td>
            <td>{{ log.details }}</td>
        </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
